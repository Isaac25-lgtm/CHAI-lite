<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAI Uganda - Admin Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F0F4F4;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1F2937}
.card{background:white;max-width:400px;width:100%;padding:40px 32px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;border:1px solid #E5E7EB}
.logo{width:60px;height:60px;background:white;border-radius:14px;border:2px solid #F3F4F6;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.logo img{width:100%;height:100%;object-fit:contain;padding:6px}
h1{font-family:'DM Sans',sans-serif;font-size:24px;color:#0A3D3E;margin-bottom:2px}
.sub{font-size:12px;color:#9CA3AF;margin-bottom:24px}
.fg{margin-bottom:16px;text-align:left}
.fg label{display:block;margin-bottom:5px;color:#374151;font-weight:600;font-size:13px}
.fg input{width:100%;padding:11px 14px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:15px;font-family:inherit;color:#1F2937;background:white}
.fg input:focus{outline:none;border-color:#0F5B5C;box-shadow:0 0 0 3px rgba(15,91,92,.08)}
.btn{padding:14px 24px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;background:#0F5B5C;color:white;transition:.15s}
.btn:hover{background:#178182}
.btn:active{transform:scale(.98)}
.flash{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px}
.flash-error{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B}
.flash-success{background:#D1FAE5;border:1px solid #A7F3D0;color:#065F46}
.flash-warning{background:#FEF3C7;border:1px solid #FDE68A;color:#92400E}
.flash-info{background:#E0F2FE;border:1px solid #BAE6FD;color:#075985}
.back{font-size:12px;color:#9CA3AF;margin-top:14px;display:block;text-decoration:none}
</style>
</head>
<body>
<div class="card">
 <div class="logo"><img src="{{ url_for('static', filename='chai-logo.jpg') }}" alt="CHAI"></div>
 <h1>CHAI Uganda</h1>
 <p class="sub">Clinton Health Access Initiative &middot; Admin Portal</p>

 {% with messages = get_flashed_messages(with_categories=true) %}
 {% if messages %}
  {% for category, message in messages %}
  <div class="flash flash-{{ category }}">{{ message }}</div>
  {% endfor %}
 {% endif %}
 {% endwith %}

 <form method="POST">
  <div class="fg"><label>Username</label><input type="text" name="username" placeholder="Enter username" required></div>
  <div class="fg"><label>Password</label><input type="password" name="password" placeholder="Enter password" required></div>
  <button type="submit" class="btn">Login</button>
 </form>
 <a href="/" class="back">Back to Registration</a>
</div>
</body>
</html>
